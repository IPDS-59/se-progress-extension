name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: |
          zip fasih-se-progress-${{ github.ref_name }}.zip \
            manifest.json \
            content.js \
            popup.html popup.js popup.css \
            results.html results.js results.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fasih-se-progress-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Cara Instalasi

            1. Download file **fasih-se-progress-${{ github.ref_name }}.zip** di bawah
            2. Ekstrak ZIP ke folder mana saja
            3. Buka Chrome → `chrome://extensions`
            4. Aktifkan **Developer mode** (pojok kanan atas)
            5. Klik **Load unpacked** → pilih folder hasil ekstrak
            6. Buka `https://fasih-sm.bps.go.id/app` → klik ikon ekstensi

            > Koneksi VPN BPS diperlukan.
