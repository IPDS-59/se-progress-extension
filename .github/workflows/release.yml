name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: |
          zip fasih-se-progress-${{ github.ref_name }}.zip \
            manifest.json \
            content.js \
            popup.html popup.js popup.css \
            results.html results.js results.css

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
            SINCE="sejak $PREV_TAG"
          else
            RANGE="HEAD"
            SINCE="awal"
          fi

          CHANGES=$(git log $RANGE --pretty=format:"- %s" --no-merges)

          {
            echo "NOTES<<EOF"
            echo "## Cara Instalasi"
            echo ""
            echo "1. Download file **fasih-se-progress-${{ github.ref_name }}.zip** di bawah"
            echo "2. Ekstrak ZIP ke folder mana saja"
            echo "3. Buka Chrome → \`chrome://extensions\`"
            echo "4. Aktifkan **Developer mode** (pojok kanan atas)"
            echo "5. Klik **Load unpacked** → pilih folder hasil ekstrak"
            echo "6. Buka \`https://fasih-sm.bps.go.id/app\` → klik ikon ekstensi"
            echo ""
            echo "> Koneksi VPN BPS diperlukan."
            echo ""
            echo "## Changelog ($SINCE)"
            echo ""
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fasih-se-progress-${{ github.ref_name }}.zip
          body: ${{ steps.changelog.outputs.NOTES }}
