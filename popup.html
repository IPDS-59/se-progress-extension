<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>FASIH SE Progress</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>FASIH SE Progress</h1>
    <p class="subtitle">Sensus Ekonomi 2026</p>
  </div>

  <div class="content">
    <div id="step-init" class="step">
      <div class="center"><div class="spinner"></div></div>
    </div>

    <div id="step-wrong-page" class="step hidden">
      <div class="notice notice-warn">
        Buka <strong>fasih-sm.bps.go.id</strong> terlebih dahulu, lalu klik ikon ekstensi ini.
      </div>
    </div>

    <div id="step-prov" class="step hidden">
      <p class="step-label">Pilih Provinsi:</p>
      <select id="sel-prov" class="sel-prov">
        <option value="11">11 – Aceh</option>
        <option value="12">12 – Sumatera Utara</option>
        <option value="13">13 – Sumatera Barat</option>
        <option value="14">14 – Riau</option>
        <option value="15">15 – Jambi</option>
        <option value="16">16 – Sumatera Selatan</option>
        <option value="17">17 – Bengkulu</option>
        <option value="18">18 – Lampung</option>
        <option value="19">19 – Kep. Bangka Belitung</option>
        <option value="21">21 – Kep. Riau</option>
        <option value="31">31 – DKI Jakarta</option>
        <option value="32">32 – Jawa Barat</option>
        <option value="33">33 – Jawa Tengah</option>
        <option value="34">34 – DI Yogyakarta</option>
        <option value="35">35 – Jawa Timur</option>
        <option value="36">36 – Banten</option>
        <option value="51">51 – Bali</option>
        <option value="52">52 – Nusa Tenggara Barat</option>
        <option value="53">53 – Nusa Tenggara Timur</option>
        <option value="61">61 – Kalimantan Barat</option>
        <option value="62">62 – Kalimantan Tengah</option>
        <option value="63">63 – Kalimantan Selatan</option>
        <option value="64">64 – Kalimantan Timur</option>
        <option value="65">65 – Kalimantan Utara</option>
        <option value="71">71 – Sulawesi Utara</option>
        <option value="72">72 – Sulawesi Tengah</option>
        <option value="73">73 – Sulawesi Selatan</option>
        <option value="74">74 – Sulawesi Tenggara</option>
        <option value="75">75 – Gorontalo</option>
        <option value="76">76 – Sulawesi Barat</option>
        <option value="81">81 – Maluku</option>
        <option value="82">82 – Maluku Utara</option>
        <option value="91">91 – Papua Barat</option>
        <option value="92">92 – Papua</option>
        <option value="94">94 – Papua Selatan</option>
        <option value="95">95 – Papua Tengah</option>
        <option value="96">96 – Papua Pegunungan</option>
        <option value="97">97 – Papua Barat Daya</option>
      </select>
      <button id="btn-prov-next" class="btn btn-primary">Lanjutkan</button>
    </div>

    <div id="step-role" class="step hidden">
      <p class="step-label">Pilih Peran:</p>
      <div class="btn-group">
        <button class="btn btn-role" id="btn-pengawas">Pengawas</button>
        <button class="btn btn-role" id="btn-pencacah">Pencacah</button>
      </div>
    </div>

    <div id="step-loading" class="step hidden">
      <div class="center">
        <div class="spinner"></div>
        <p>Mengambil daftar kabupaten...</p>
      </div>
    </div>

    <div id="step-select-kabs" class="step hidden">
      <p class="step-label">Pilih Kabupaten/Kota:</p>
      <div class="kab-header">
        <label class="chk-label">
          <input type="checkbox" id="chk-all"> Pilih Semua
        </label>
        <span id="kab-count" class="kab-count">0 dipilih</span>
      </div>
      <div id="kab-list" class="kab-list"></div>
      <button id="btn-start" class="btn btn-primary" disabled>Mulai Ekstrak</button>
    </div>

    <div id="step-progress" class="step hidden">
      <div class="progress-status">
        <div class="spinner spinner-sm"></div>
        <span id="progress-text">Memproses...</span>
      </div>
      <div id="log" class="log"></div>
    </div>

    <div id="step-error" class="step hidden">
      <div class="notice notice-error">
        <strong>Gagal mengambil data.</strong>
        <div id="error-detail" class="error-detail"></div>
      </div>
      <button id="btn-retry" class="btn btn-secondary">Coba Lagi</button>
    </div>

    <div id="step-done" class="step hidden">
      <div class="notice notice-success">
        <strong>Selesai!</strong>
        <div id="done-summary"></div>
      </div>
      <button id="btn-view-results" class="btn btn-primary">Lihat Hasil &rarr;</button>
      <button id="btn-restart" class="btn btn-ghost">Ekstrak Ulang</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
